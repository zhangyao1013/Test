<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问题数据看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #0f172a;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .subtitle {
      margin: 0 0 20px;
      color: #64748b;
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }
    .stat-card .label {
      font-size: 12px;
      color: #64748b;
    }
    .stat-card .value {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 700;
    }
    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }
    .chart-card h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #334155;
    }
    .table-wrap {
      background: #fff;
      border-radius: 10px;
      overflow: auto;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
    }
    th {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      background: #f8fafc;
      position: sticky;
      top: 0;
    }
    td { color: #475569; }
    .status {
      font-weight: 600;
    }
    .status-delay { color: #b91c1c; }
    .status-ok { color: #0f766e; }
    .status-closed { color: #64748b; }
    .empty {
      padding: 48px;
      text-align: center;
      color: #64748b;
    }
    .empty code {
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="page" id="app"></div>

  <script src="data.js"></script>
  <script>
    const COLUMNS = [
      { key: 'id', label: 'ID' },
      { key: 'description', label: '问题描述' },
      { key: 'assignee', label: '跟进人' },
      { key: 'type', label: '问题类型' },
      { key: 'created', label: '录入时间' },
      { key: 'status', label: '问题状态' },
      { key: 'priority_score', label: '优先级' },
      { key: 'resolve_hours', label: '处理时长(h)' },
    ];

    const STATUS_CLASS = {
      '延期修复': 'status-delay',
      '正常': 'status-ok',
      '已关闭': 'status-closed',
    };

    function countBy(items, key) {
      return items.reduce((acc, row) => {
        const v = row[key];
        acc[v] = (acc[v] || 0) + 1;
        return acc;
      }, {});
    }

    function statusClass(status) {
      return STATUS_CLASS[status] || 'status-ok';
    }

    function renderEmpty(root) {
      root.innerHTML = `
        <h1>问题数据看板</h1>
        <div class="empty">
          <p>未找到测试数据，请先生成：</p>
          <p><code>.venv/bin/python generate_data.py</code></p>
        </div>
      `;
    }

    function renderStats(items) {
      const byStatus = countBy(items, 'status');
      const delayed = byStatus['延期修复'] || 0;
      return `
        <div class="stats">
          <div class="stat-card"><div class="label">问题总数</div><div class="value">${items.length}</div></div>
          <div class="stat-card"><div class="label">正常</div><div class="value">${byStatus['正常'] || 0}</div></div>
          <div class="stat-card"><div class="label">延期修复</div><div class="value">${delayed}</div></div>
          <div class="stat-card"><div class="label">已关闭</div><div class="value">${byStatus['已关闭'] || 0}</div></div>
        </div>
      `;
    }

    function renderTable(items) {
      const head = COLUMNS.map(c => `<th>${c.label}</th>`).join('');
      const body = items.map(row => {
        const cells = COLUMNS.map(col => {
          let value = row[col.key] ?? '';
          if (col.key === 'status') {
            return `<td class="status ${statusClass(value)}">${value}</td>`;
          }
          return `<td>${value}</td>`;
        }).join('');
        return `<tr>${cells}</tr>`;
      }).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${head}</tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function renderCharts(items) {
      return `
        <div class="charts">
          <div class="chart-card">
            <h2>问题类型分布</h2>
            <canvas id="chart-type"></canvas>
          </div>
          <div class="chart-card">
            <h2>问题状态占比</h2>
            <canvas id="chart-status"></canvas>
          </div>
        </div>
      `;
    }

    function buildCharts(items) {
      const typeCounts = countBy(items, 'type');
      const statusCounts = countBy(items, 'status');

      new Chart(document.getElementById('chart-type'), {
        type: 'bar',
        data: {
          labels: Object.keys(typeCounts),
          datasets: [{
            label: '数量',
            data: Object.values(typeCounts),
            backgroundColor: '#3b82f6',
            borderRadius: 6,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
        },
      });

      new Chart(document.getElementById('chart-status'), {
        type: 'pie',
        data: {
          labels: Object.keys(statusCounts),
          datasets: [{
            data: Object.values(statusCounts),
            backgroundColor: ['#0f766e', '#b91c1c', '#94a3b8'],
          }],
        },
        options: { responsive: true },
      });
    }

    function render() {
      const root = document.getElementById('app');
      const items = typeof ISSUES_DATA !== 'undefined' ? ISSUES_DATA : [];

      if (!items.length) {
        renderEmpty(root);
        return;
      }

      root.innerHTML = `
        <h1>问题数据看板</h1>
        <p class="subtitle">数据来自 generate_data.py 生成的测试物料（data.csv / data.js）</p>
        ${renderStats(items)}
        ${renderCharts(items)}
        ${renderTable(items)}
      `;
      buildCharts(items);
    }

    window.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
